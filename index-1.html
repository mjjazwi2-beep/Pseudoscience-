<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Pseudoscience — بنك الأسئلة</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS — Pseudoscience Medical
   Palette: deep navy + electric teal + warm white
   Signature: animated molecule-dot background
═══════════════════════════════════════════ */
:root {
  --navy:       #0B1628;
  --navy-2:     #111F38;
  --navy-3:     #1A2F50;
  --teal:       #00C9A7;
  --teal-dim:   #00A389;
  --teal-glow:  rgba(0,201,167,0.15);
  --teal-glass: rgba(0,201,167,0.08);
  --amber:      #FFB347;
  --red:        #FF5A5A;
  --green:      #4ADE80;
  --text-1:     #EFF6FF;
  --text-2:     #94A3B8;
  --text-3:     #4E6480;
  --border:     rgba(255,255,255,0.07);
  --border-2:   rgba(0,201,167,0.25);
  --radius-sm:  10px;
  --radius-md:  16px;
  --radius-lg:  24px;
  --font:       'IBM Plex Sans Arabic', sans-serif;
  --mono:       'IBM Plex Mono', monospace;
  --ease:       cubic-bezier(0.16,1,0.3,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: var(--font);
  background: var(--navy);
  color: var(--text-1);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Molecule Background ── */
.bg-canvas {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,201,167,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 90%, rgba(0,100,200,0.08) 0%, transparent 50%),
    var(--navy);
  pointer-events: none;
}
.bg-canvas::after {
  content: '';
  position: absolute; inset: 0;
  background-image:
    radial-gradient(circle 1.5px at 20% 30%, rgba(0,201,167,0.3) 0%, transparent 100%),
    radial-gradient(circle 1px at 70% 60%, rgba(0,201,167,0.2) 0%, transparent 100%),
    radial-gradient(circle 2px at 45% 80%, rgba(0,201,167,0.15) 0%, transparent 100%),
    radial-gradient(circle 1px at 85% 25%, rgba(255,255,255,0.1) 0%, transparent 100%),
    radial-gradient(circle 1.5px at 10% 70%, rgba(0,201,167,0.2) 0%, transparent 100%);
}

/* ── App Shell ── */
#app { position: relative; z-index: 1; min-height: 100vh; }

/* ── Header ── */
.app-header {
  padding: 20px 20px 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 100;
  background: rgba(11,22,40,0.85);
}
.logo-mark {
  display: flex; align-items: center; gap: 10px;
}
.logo-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--teal), #0099cc);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  box-shadow: 0 0 20px rgba(0,201,167,0.3);
}
.logo-text { line-height: 1.1; }
.logo-name { font-size: 15px; font-weight: 700; letter-spacing: 0.5px; color: var(--text-1); }
.logo-sub  { font-size: 10px; color: var(--teal); font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; }

.header-actions { display: flex; gap: 8px; }
.icon-btn {
  width: 36px; height: 36px; border-radius: 10px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.04);
  color: var(--text-2); font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.icon-btn:hover, .icon-btn.active {
  background: var(--teal-glass); border-color: var(--border-2); color: var(--teal);
}

/* ── Screens ── */
.screen { display: none; padding: 20px; animation: fadeUp 0.3s var(--ease); }
.screen.active { display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Section Title ── */
.section-title {
  font-size: 11px; font-weight: 600; letter-spacing: 2px;
  text-transform: uppercase; color: var(--teal);
  margin-bottom: 14px; padding-right: 4px;
  display: flex; align-items: center; gap: 8px;
}
.section-title::before {
  content: ''; display: inline-block;
  width: 3px; height: 14px; border-radius: 2px;
  background: var(--teal);
}

/* ── Stage Cards (Home) ── */
.stage-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
.stage-card {
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  background: var(--navy-2);
  padding: 20px 16px;
  cursor: pointer;
  transition: all 0.25s var(--ease);
  text-align: center; position: relative; overflow: hidden;
}
.stage-card::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--teal-glass), transparent);
  opacity: 0; transition: opacity 0.25s;
}
.stage-card:hover::before, .stage-card:active::before { opacity: 1; }
.stage-card:hover { border-color: var(--border-2); transform: translateY(-2px); }
.stage-card.locked { opacity: 0.45; cursor: not-allowed; }
.stage-icon { font-size: 32px; margin-bottom: 10px; display: block; }
.stage-name { font-size: 13px; font-weight: 600; color: var(--text-1); }
.stage-count { font-size: 11px; color: var(--text-2); margin-top: 4px; }
.stage-badge {
  position: absolute; top: 8px; left: 8px;
  font-size: 9px; font-weight: 700; padding: 2px 7px;
  border-radius: 20px; letter-spacing: 0.5px;
}
.badge-soon { background: rgba(255,179,71,0.15); color: var(--amber); border: 1px solid rgba(255,179,71,0.3); }
.badge-active { background: rgba(0,201,167,0.15); color: var(--teal); border: 1px solid rgba(0,201,167,0.3); }

/* ── Breadcrumb ── */
.breadcrumb {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 20px; flex-wrap: wrap;
}
.breadcrumb-item {
  font-size: 12px; color: var(--text-3); cursor: pointer;
  transition: color 0.2s;
}
.breadcrumb-item:hover { color: var(--teal); }
.breadcrumb-item.active { color: var(--text-1); cursor: default; }
.breadcrumb-sep { color: var(--text-3); font-size: 10px; }

/* ── List Items ── */
.list-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px; border-radius: var(--radius-md);
  border: 1px solid var(--border);
  background: var(--navy-2);
  cursor: pointer; margin-bottom: 10px;
  transition: all 0.2s var(--ease);
}
.list-item:hover { border-color: var(--border-2); background: var(--navy-3); transform: translateX(-3px); }
.list-item-icon {
  width: 40px; height: 40px; border-radius: var(--radius-sm);
  background: var(--teal-glass); border: 1px solid var(--border-2);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.list-item-body { flex: 1; }
.list-item-name { font-size: 14px; font-weight: 600; color: var(--text-1); }
.list-item-sub  { font-size: 12px; color: var(--text-2); margin-top: 3px; }
.list-item-arrow { color: var(--text-3); font-size: 14px; }

/* ── Set Type Tabs ── */
.type-tabs {
  display: flex; gap: 8px; margin-bottom: 20px;
  overflow-x: auto; padding-bottom: 4px;
}
.type-tab {
  padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 600;
  border: 1px solid var(--border); background: transparent; color: var(--text-2);
  cursor: pointer; white-space: nowrap; transition: all 0.2s;
}
.type-tab.active { background: var(--teal); color: var(--navy); border-color: var(--teal); }

/* ── Quiz Mode ── */
.quiz-wrap { max-width: 600px; margin: 0 auto; }

.quiz-progress-bar {
  height: 3px; background: var(--border); border-radius: 99px;
  margin-bottom: 20px; overflow: hidden;
}
.quiz-progress-fill {
  height: 100%; background: linear-gradient(90deg, var(--teal), #0099cc);
  border-radius: 99px; transition: width 0.4s var(--ease);
}

.quiz-meta {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px;
}
.quiz-counter { font-size: 12px; color: var(--text-2); }
.quiz-score-pill {
  font-size: 11px; font-weight: 600; padding: 4px 12px;
  border-radius: 20px; background: var(--teal-glass);
  border: 1px solid var(--border-2); color: var(--teal);
}

.question-card {
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  background: var(--navy-2);
  padding: 24px; margin-bottom: 16px;
}
.question-number {
  font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--teal);
  text-transform: uppercase; margin-bottom: 12px;
}
.question-text {
  font-size: 15px; font-weight: 500; line-height: 1.7;
  color: var(--text-1);
}
.question-img {
  width: 100%; border-radius: var(--radius-sm); margin-top: 14px;
  border: 1px solid var(--border);
}

.options-grid { display: flex; flex-direction: column; gap: 10px; }
.option-btn {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border-radius: var(--radius-md);
  border: 1px solid var(--border);
  background: var(--navy-2); cursor: pointer;
  text-align: right; width: 100%;
  transition: all 0.2s var(--ease);
  position: relative; overflow: hidden;
}
.option-btn:hover:not(:disabled) {
  border-color: var(--border-2); background: var(--navy-3);
}
.option-letter {
  width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
  border: 1px solid var(--border); background: rgba(255,255,255,0.04);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: var(--text-2);
  font-family: var(--mono); transition: all 0.2s;
}
.option-text { font-size: 13px; color: var(--text-1); line-height: 1.5; flex: 1; }

.option-btn.correct {
  border-color: var(--green); background: rgba(74,222,128,0.08);
}
.option-btn.correct .option-letter {
  background: var(--green); color: var(--navy); border-color: var(--green);
}
.option-btn.wrong {
  border-color: var(--red); background: rgba(255,90,90,0.08);
}
.option-btn.wrong .option-letter {
  background: var(--red); color: white; border-color: var(--red);
}
.option-btn:disabled { cursor: default; }

.explanation-box {
  border-radius: var(--radius-md); padding: 16px;
  background: rgba(0,201,167,0.06); border: 1px solid var(--border-2);
  margin-top: 14px; display: none;
}
.explanation-box.show { display: block; animation: fadeUp 0.3s var(--ease); }
.explanation-label { font-size: 10px; font-weight: 700; color: var(--teal); letter-spacing: 1.5px; margin-bottom: 8px; }
.explanation-text  { font-size: 13px; color: var(--text-2); line-height: 1.6; }

.quiz-nav {
  display: flex; gap: 10px; margin-top: 16px;
}
.btn {
  flex: 1; padding: 14px; border-radius: var(--radius-md);
  font-family: var(--font); font-size: 14px; font-weight: 600;
  cursor: pointer; border: none; transition: all 0.2s var(--ease);
}
.btn-primary {
  background: var(--teal); color: var(--navy);
}
.btn-primary:hover { background: var(--teal-dim); transform: translateY(-1px); }
.btn-secondary {
  background: var(--navy-3); color: var(--text-1);
  border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--border-2); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

/* ── Results ── */
.results-card {
  border-radius: var(--radius-lg); padding: 32px 24px;
  background: var(--navy-2); border: 1px solid var(--border);
  text-align: center; margin-bottom: 20px;
}
.results-ring {
  width: 110px; height: 110px; border-radius: 50%;
  border: 4px solid var(--border); position: relative;
  margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;
  background: conic-gradient(var(--teal) 0%, var(--border) 0%);
}
.results-pct { font-size: 28px; font-weight: 700; color: var(--text-1); }
.results-label { font-size: 12px; color: var(--text-2); margin-top: 4px; }
.results-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.results-subtitle { font-size: 13px; color: var(--text-2); line-height: 1.5; }
.results-stats {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 12px; margin: 24px 0;
}
.stat-box {
  border-radius: var(--radius-md); padding: 14px 10px;
  background: var(--navy-3); border: 1px solid var(--border);
}
.stat-num { font-size: 22px; font-weight: 700; }
.stat-lbl { font-size: 10px; color: var(--text-2); margin-top: 4px; }
.stat-correct { color: var(--green); }
.stat-wrong   { color: var(--red); }
.stat-total   { color: var(--teal); }

/* ── Admin Panel ── */
.admin-tabs {
  display: flex; gap: 8px; margin-bottom: 20px;
  border-bottom: 1px solid var(--border); padding-bottom: 0;
}
.admin-tab {
  padding: 10px 16px; font-size: 13px; font-weight: 600;
  color: var(--text-2); cursor: pointer; border: none; background: none;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: all 0.2s; font-family: var(--font);
}
.admin-tab.active { color: var(--teal); border-bottom-color: var(--teal); }

.form-group { margin-bottom: 16px; }
.form-label {
  display: block; font-size: 11px; font-weight: 600;
  color: var(--teal); letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 8px;
}
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 12px 14px;
  border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--navy-3); color: var(--text-1);
  font-family: var(--font); font-size: 14px;
  transition: border-color 0.2s; outline: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--teal);
}
.form-select option { background: var(--navy-2); }
.form-textarea { resize: vertical; min-height: 80px; }

.options-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.correct-select { display: flex; gap: 8px; flex-wrap: wrap; }
.correct-opt {
  width: 40px; height: 40px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--navy-3);
  color: var(--text-2); font-weight: 700; font-family: var(--mono);
  cursor: pointer; transition: all 0.2s;
}
.correct-opt.selected { background: var(--teal); color: var(--navy); border-color: var(--teal); }

.q-list-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px; border-radius: var(--radius-md);
  border: 1px solid var(--border); background: var(--navy-2);
  margin-bottom: 10px;
}
.q-num {
  width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0;
  background: var(--teal-glass); border: 1px solid var(--border-2);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: var(--teal); font-family: var(--mono);
}
.q-body { flex: 1; }
.q-text { font-size: 13px; color: var(--text-1); line-height: 1.5; }
.q-answer { font-size: 11px; color: var(--teal); margin-top: 4px; font-weight: 600; }
.q-actions { display: flex; gap: 6px; margin-top: 8px; }
.q-action-btn {
  padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
  border: 1px solid var(--border); background: transparent; color: var(--text-2);
  cursor: pointer; transition: all 0.2s; font-family: var(--font);
}
.q-action-btn.edit { color: var(--teal); border-color: var(--border-2); }
.q-action-btn.del  { color: var(--red);  border-color: rgba(255,90,90,0.3); }
.q-action-btn:hover { opacity: 0.8; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--navy-3); border: 1px solid var(--border);
  color: var(--text-1); padding: 12px 20px; border-radius: 30px;
  font-size: 13px; font-weight: 500; z-index: 9999;
  transition: transform 0.3s var(--ease), opacity 0.3s;
  white-space: nowrap; opacity: 0;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.success { border-color: rgba(74,222,128,0.4); color: var(--green); }
.toast.error   { border-color: rgba(255,90,90,0.4);  color: var(--red);   }

/* ── Loading ── */
.spinner {
  width: 32px; height: 32px; border-radius: 50%;
  border: 3px solid var(--border);
  border-top-color: var(--teal);
  animation: spin 0.7s linear infinite;
  margin: 40px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty-state { text-align: center; padding: 48px 20px; color: var(--text-2); }
.empty-icon  { font-size: 40px; margin-bottom: 12px; }
.empty-text  { font-size: 14px; line-height: 1.6; }

/* ── Stats Screen ── */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.stats-card {
  border-radius: var(--radius-md); padding: 18px;
  background: var(--navy-2); border: 1px solid var(--border);
}
.stats-card-num { font-size: 28px; font-weight: 700; color: var(--teal); }
.stats-card-lbl { font-size: 11px; color: var(--text-2); margin-top: 4px; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--text-3); border-radius: 99px; }

/* ── Bottom Nav ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; background: rgba(11,22,40,0.95);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  padding: 8px 4px 12px; z-index: 200;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 6px; cursor: pointer; transition: all 0.2s; border: none; background: none;
  color: var(--text-3); font-family: var(--font);
}
.nav-item.active { color: var(--teal); }
.nav-icon  { font-size: 20px; }
.nav-label { font-size: 9px; font-weight: 600; letter-spacing: 0.5px; }

#main-content { padding-bottom: 80px; }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px); z-index: 500;
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-sheet {
  width: 100%; max-width: 600px; max-height: 90vh;
  background: var(--navy-2); border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  border: 1px solid var(--border); overflow-y: auto;
  padding: 24px; transform: translateY(20px);
  transition: transform 0.3s var(--ease);
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }
.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px;
}
.modal-title { font-size: 16px; font-weight: 700; }
.modal-close {
  width: 32px; height: 32px; border-radius: 8px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-2); cursor: pointer; font-size: 16px;
}

/* Admin password screen */
.admin-lock {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 32px 24px; text-align: center;
}
.admin-lock-icon { font-size: 48px; margin-bottom: 20px; }
.admin-lock h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.admin-lock p  { font-size: 13px; color: var(--text-2); margin-bottom: 24px; }

</style>
</head>
<body>
<div class="bg-canvas"></div>
<div id="app">
  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="showScreen('home')" id="nav-home">
      <span class="nav-icon">🏠</span><span class="nav-label">الرئيسية</span>
    </button>
    <button class="nav-item" onclick="showScreen('browse')" id="nav-browse">
      <span class="nav-icon">📚</span><span class="nav-label">الأسئلة</span>
    </button>
    <button class="nav-item" onclick="showScreen('stats-screen')" id="nav-stats">
      <span class="nav-icon">📊</span><span class="nav-label">إحصائياتي</span>
    </button>
    <button class="nav-item" onclick="tryAdmin()" id="nav-admin">
      <span class="nav-icon">⚙️</span><span class="nav-label">أدمن</span>
    </button>
  </nav>

  <div id="main-content">

  <!-- ══════════════ HOME SCREEN ══════════════ -->
  <div id="home" class="screen active">
    <div class="app-header">
      <div class="logo-mark">
        <div class="logo-icon">🔬</div>
        <div class="logo-text">

// ═══════════════════════════════════════════

// ═══════════════════════════════════════════
async function sbFetch(path, opts = {}) {
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${SB_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || 'return=representation',
      ...opts.headers
    },
    ...opts
  });
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e.message || r.statusText);
  }
  return r.status === 204 ? null : r.json();
}

const db = {
  get:    (t, q='') => sbFetch(`${t}?${q}&order=order_num.asc,id.asc`),
  post:   (t, b)    => sbFetch(t, { method:'POST', body: JSON.stringify(b) }),
  patch:  (t, q, b) => sbFetch(`${t}?${q}`, { method:'PATCH', body: JSON.stringify(b) }),
  delete: (t, q)    => sbFetch(`${t}?${q}`, { method:'DELETE', prefer:'return=minimal' }),

// Local stats

// ═══════════════════════════════════════════

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const map = {'home':'nav-home','browse':'nav-browse','stats-screen':'nav-stats','admin-screen':'nav-admin'};
  if (map[id]) document.getElementById(map[id]).classList.add('active');
  state.screen = id;
  if (id === 'stats-screen') renderStats();
  if (id === 'browse' && state.nav.length === 0) loadBrowse();
}

// ═══════════════════════════════════════════
//  HOME
// ═══════════════════════════════════════════
async function loadHome() {
  try {
    const stages = await db.get('stages');
    const grid = document.getElementById('stages-grid');
    grid.innerHTML = stages.map(s => `
      <div class="stage-card ${s.id===2?'locked':''}" onclick="${s.id===2?'toast(\'قريباً — Clinic\',\'info\')':'browseStage('+s.id+',\''+s.name+'\')'}">
        <span class="stage-badge ${s.id===2?'badge-soon':'badge-active'}">${s.id===2?'قريباً':'متاح'}</span>
        <span class="stage-icon">${s.icon}</span>
        <div class="stage-name">${s.name}</div>
        <div class="stage-count">${s.name_ar}</div>
      </div>
    `).join('');
    renderRecentActivity();
  } catch(e) {
    document.getElementById('stages-grid').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">تعذّر تحميل البيانات</div></div>`;
  }
}

function renderRecentActivity() {
  const stats = getStats();
  const el = document.getElementById('recent-activity');
  if (!stats.sessions.length) return;
  const last = stats.sessions.slice(-3).reverse();
  el.innerHTML = last.map(s => `
    <div class="list-item" style="cursor:default">
      <div class="list-item-icon">📝</div>
      <div class="list-item-body">
        <div class="list-item-name">${s.name}</div>
        <div class="list-item-sub">${s.correct}/${s.total} صحيح · ${new Date(s.date).toLocaleDateString('ar')}</div>
      </div>
      <div style="font-size:14px;font-weight:700;color:${s.pct>=70?'var(--green)':'var(--amber)'}">${s.pct}%</div>
    </div>
  `).join('');
}

function loadBrowse() {
  state.nav = [];

  renderBrowseLevel();

function browseStage(id, name) {
  state.nav = [{type:'stage', id, name}];

  updateBreadcrumb();
  renderBrowseLevel();
}

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  const backBtn = document.getElementById('back-btn');
  const title = document.getElementById('browse-title');

  const items = [{type:'root', name:'الأسئلة'}];
  const all = [...items, ...state.nav];

  bc.innerHTML = all.map((item, i) => {
    const isLast = i === all.length - 1;
    return `
      ${i>0?'<span class="breadcrumb-sep">›</span>':''}
      <span class="breadcrumb-item ${isLast?'active':''}"
        onclick="${isLast?'':'navTo('+i+')'}">${item.name}</span>
    `;
  }).join('');

  backBtn.style.display = state.nav.length > 0 ? 'flex' : 'none';
  title.textContent = state.nav.length ? state.nav[state.nav.length-1].name : 'تصفح الأسئلة';
}

function navTo(idx) {
  if (idx === 0) { state.nav = []; }
  else { state.nav = state.nav.slice(0, idx); }
  updateBreadcrumb();
  renderBrowseLevel();
}

function goBack() {
  state.nav.pop();
  updateBreadcrumb();
  renderBrowseLevel();
}

async function renderBrowseLevel() {
  const el = document.getElementById('browse-content');
  el.innerHTML = '<div class="spinner"></div>';
  const depth = state.nav.length;

  try {
    if (depth === 0) {
      // Show stages
      const stages = await db.get('stages');
      el.innerHTML = stages.map(s => `
        <div class="list-item" onclick="navPush({type:'stage',id:${s.id},name:'${s.name}'})">
          <div class="list-item-icon">${s.icon}</div>
          <div class="list-item-body">
            <div class="list-item-name">${s.name}</div>
            <div class="list-item-sub">${s.name_ar}</div>
          </div>
          <div class="list-item-arrow">›</div>
        </div>
      `).join('') || emptyState('لا توجد مراحل');

    } else if (depth === 1) {
      // Show semesters
      const stageId = state.nav[0].id;
      const sems = await db.get('semesters', `stage_id=eq.${stageId}`);
      el.innerHTML = sems.map(s => `
        <div class="list-item" onclick="navPush({type:'semester',id:${s.id},name:'${s.name}'})">
          <div class="list-item-icon">📅</div>
          <div class="list-item-body">
            <div class="list-item-name">${s.name}</div>
            <div class="list-item-sub">${s.name_ar||''}</div>
          </div>
          <div class="list-item-arrow">›</div>
        </div>
      `).join('') || emptyState('لا توجد فصول بعد');

    } else if (depth === 2) {
      // Show subjects
      const semId = state.nav[1].id;
      const subs = await db.get('subjects', `semester_id=eq.${semId}`);
      el.innerHTML = subs.map(s => `
        <div class="list-item" onclick="navPush({type:'subject',id:${s.id},name:'${s.name}'})">
          <div class="list-item-icon">${s.icon||'📚'}</div>
          <div class="list-item-body">
            <div class="list-item-name">${s.name}</div>
            <div class="list-item-sub">${s.name_ar||''}</div>
          </div>
          <div class="list-item-arrow">›</div>
        </div>
      `).join('') || emptyState('لا توجد مواد بعد');

    } else if (depth === 3) {
      // Show question sets with type tabs
      const subId = state.nav[2].id;
      const sets = await db.get('question_sets', `subject_id=eq.${subId}`);

      const types = {batch:'📚 دفعات', doctor:'👨‍⚕️ دكاتره', mixed:'🔀 متنوعة'};
      const grouped = {};
      sets.forEach(s => { if(!grouped[s.set_type]) grouped[s.set_type]=[]; grouped[s.set_type].push(s); });

      let html = `<div class="type-tabs">
        <button class="type-tab active" onclick="filterSets(this,'all')">الكل (${sets.length})</button>
        ${Object.keys(grouped).map(t=>`<button class="type-tab" onclick="filterSets(this,'${t}')">${types[t]||t} (${grouped[t].length})</button>`).join('')}
      </div>
      <div id="sets-list">`;
      html += sets.map(s => `
        <div class="list-item set-item" data-type="${s.set_type}" onclick="openSet(${s.id},'${s.name.replace(/'/g,"\\'")}')">
          <div class="list-item-icon">${s.set_type==='batch'?'📚':s.set_type==='doctor'?'👨‍⚕️':'🔀'}</div>
          <div class="list-item-body">
            <div class="list-item-name">${s.name}</div>
            <div class="list-item-sub">${s.description||'اضغط للبدء'}</div>
          </div>
          <div class="list-item-arrow">›</div>
        </div>
      `).join('') || emptyState('لا توجد مجموعات بعد');
      html += '</div>';
      el.innerHTML = sets.length ? html : emptyState('لا توجد مجموعات أسئلة بعد');

    } else if (depth === 4) {
      // Set view — start quiz or browse
      const set = state.nav[3];

        <div class="results-card" style="margin-bottom:16px;">

            🔀 خلط وابدأ
          </button>
        </div>
      `;
    }
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">${e.message}</div></div>`;

}

// ═══════════════════════════════════════════
//  QUIZ ENGINE
// ═══════════════════════════════════════════
function startQuiz(questions, name) {
  if (!questions.length) { showToast('لا توجد أسئلة في هذه المجموعة', 'error'); return; }
  state.quiz = { questions, current: 0, answers: {}, score: 0, setName: name, startTime: Date.now() };
  document.getElementById('quiz-title').textContent = name;
  renderQuestion();
  showScreen('quiz-screen');
}

function renderQuestion() {
  const { questions, current, answers } = state.quiz;
  const q = questions[current];
  const total = questions.length;
  const answered = Object.keys(answers).length;

  document.getElementById('quiz-progress').style.width = `${(current/total)*100}%`;
  document.getElementById('quiz-counter').textContent = `${current+1} / ${total}`;
  document.getElementById('quiz-score').textContent = `✅ ${state.quiz.score}`;
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').textContent = current === total-1 ? 'النتائج 🏁' : 'التالي';

  const opts = ['A','B','C','D','E'].filter(l => q[`option_${l.toLowerCase()}`]);
  const userAns = answers[current];
  const isAnswered = userAns !== undefined;

  const area = document.getElementById('question-area');
  area.innerHTML = `
    <div class="question-card">
      <div class="question-number">السؤال ${current+1}</div>
      <div class="question-text">${q.question_text}</div>
      ${q.image_url ? `<img class="question-img" src="${q.image_url}" alt=""/>` : ''}
    </div>
    <div class="options-grid">
      ${opts.map(l => {
        const text = q[`option_${l.toLowerCase()}`];
        let cls = '';
        if (isAnswered) {
          if (l === q.correct_answer) cls = 'correct';
          else if (l === userAns)     cls = 'wrong';
        }
        return `
          <button class="option-btn ${cls}" ${isAnswered?'disabled':''} onclick="answerQ('${l}')">
            <span class="option-letter">${l}</span>
            <span class="option-text">${text}</span>
          </button>`;
      }).join('')}
    </div>
    <div class="explanation-box ${isAnswered && q.explanation ? 'show' : ''}" id="expl-box">
      <div class="explanation-label">💡 الشرح</div>
      <div class="explanation-text">${q.explanation||''}</div>
    </div>
  `;
}

function answerQ(letter) {
  const { questions, current } = state.quiz;
  if (state.quiz.answers[current] !== undefined) return;
  state.quiz.answers[current] = letter;
  if (letter === questions[current].correct_answer) state.quiz.score++;
  renderQuestion();
  if (window.Telegram?.WebApp) Telegram.WebApp.HapticFeedback?.impactOccurred('light');
}

function quizNav(dir) {
  const { questions, current } = state.quiz;
  const next = current + dir;
  if (next < 0) return;
  if (next >= questions.length) { showResults(); return; }
  state.quiz.current = next;
  renderQuestion();
}

function showResults() {
  const { questions, score, setName, startTime } = state.quiz;
  const total = questions.length;
  const pct = Math.round((score/total)*100);
  const duration = Math.round((Date.now()-startTime)/1000);

  document.getElementById('results-pct').textContent = `${pct}%`;
  document.getElementById('r-correct').textContent = score;
  document.getElementById('r-wrong').textContent   = total - score;
  document.getElementById('r-total').textContent   = total;

  const ring = document.getElementById('results-ring');
  ring.style.background = `conic-gradient(var(--teal) ${pct*3.6}deg, var(--border) 0deg)`;

  const titles = pct>=90?'ممتاز! 🏆':pct>=70?'جيد جداً 🌟':pct>=50?'جيد 👍':'تحتاج مراجعة 📖';
  document.getElementById('results-title').textContent = titles;
  document.getElementById('results-subtitle').textContent = `أجبت على ${score} من ${total} بشكل صحيح في ${duration} ثانية`;

  // Save to local stats
  const stats = getStats();
  stats.sessions.push({ name: setName, correct: score, total, pct, date: Date.now(), duration });
  stats.total   = (stats.total||0) + total;
  stats.correct = (stats.correct||0) + score;
  if (stats.sessions.length > 50) stats.sessions.shift();
  saveStats(stats);

  showScreen('results-screen');
}

function retryQuiz() {
  state.quiz.current = 0;
  state.quiz.answers = {};
  state.quiz.score = 0;
  state.quiz.startTime = Date.now();
  renderQuestion();
  showScreen('quiz-screen');
}

function exitQuiz() {
  if (Object.keys(state.quiz.answers).length > 0) {
    if (confirm('هل تريد الخروج؟ سيُفقد تقدمك.')) showScreen('browse');
  } else showScreen('browse');
}

function shuffleArr(arr) { for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr; }

// ═══════════════════════════════════════════
//  STATS
// ═══════════════════════════════════════════
function renderStats() {
  const stats = getStats();
  const total   = stats.total || 0;
  const correct = stats.correct || 0;
  const pct = total ? Math.round(correct/total*100) : 0;

  document.getElementById('stats-grid').innerHTML = `
    <div class="stats-card"><div class="stats-card-num">${total}</div><div class="stats-card-lbl">إجمالي الأسئلة</div></div>
    <div class="stats-card"><div class="stats-card-num" style="color:var(--green)">${correct}</div><div class="stats-card-lbl">إجابات صحيحة</div></div>
    <div class="stats-card"><div class="stats-card-num" style="color:var(--red)">${total-correct}</div><div class="stats-card-lbl">إجابات خاطئة</div></div>
    <div class="stats-card"><div class="stats-card-num">${pct}%</div><div class="stats-card-lbl">نسبة النجاح</div></div>
  `;

  const sessions = [...(stats.sessions||[])].reverse().slice(0,10);
  document.getElementById('sessions-list').innerHTML = sessions.length
    ? sessions.map(s => `
      <div class="q-list-item">
        <div class="q-num">${s.pct}%</div>
        <div class="q-body">
          <div class="q-text">${s.name}</div>
          <div class="q-answer">${s.correct}/${s.total} · ${new Date(s.date).toLocaleDateString('ar')}</div>
        </div>
      </div>
    `).join('')
    : emptyState('لا توجد جلسات بعد');
}

async function saveQuestion() {
  const setId  = document.getElementById('a-set').value;
  const qtext  = document.getElementById('a-qtext').value.trim();
  const optA   = document.getElementById('a-opt-a').value.trim();
  const optB   = document.getElementById('a-opt-b').value.trim();
  const optC   = document.getElementById('a-opt-c').value.trim();
  const optD   = document.getElementById('a-opt-d').value.trim();
  const expl   = document.getElementById('a-expl').value.trim();

  if (!setId)  return showToast('اختر مجموعة أسئلة', 'error');
  if (!qtext)  return showToast('أدخل نص السؤال', 'error');
  if (!optA || !optB) return showToast('أدخل خيار A وB على الأقل', 'error');
  if (!state.selectedCorrect) return showToast('حدد الإجابة الصحيحة', 'error');

  const payload = {
    set_id: parseInt(setId),
    question_text: qtext,
    option_a: optA, option_b: optB,
    option_c: optC||null, option_d: optD||null,
    correct_answer: state.selectedCorrect,
    explanation: expl||null,
  };

  try {
    if (state.editingId) {
      await db.patch('questions', `id=eq.${state.editingId}`, payload);
      showToast('تم تعديل السؤال ✅', 'success');
      state.editingId = null;
    } else {
      await db.post('questions', payload);
      showToast('تم حفظ السؤال ✅', 'success');
    }
    // Clear form
    ['a-qtext','a-opt-a','a-opt-b','a-opt-c','a-opt-d','a-expl'].forEach(id => document.getElementById(id).value='');
    document.querySelectorAll('.correct-opt').forEach(b => b.classList.remove('selected'));
    state.selectedCorrect = null;
  } catch(e) { showToast('خطأ: ' + e.message, 'error'); }
}
